[build]
  command = "bash -c 'HASH=$(git rev-parse --short HEAD 2>/dev/null || date +%s); for f in index.html pages/*.html; do sed -i \"s/app\\.js?v=[a-z0-9]*/app.js?v=$HASH/g\" \"$f\"; done; echo \"Cache-bust: app.js?v=$HASH\"'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/registrations"
  to = "/.netlify/functions/get-registrations"
  status = 200

[[redirects]]
  from = "/api/store-registration"
  to = "/.netlify/functions/store-registration"
  status = 200

[[redirects]]
  from = "/api/registration-status"
  to = "/.netlify/functions/registration-status"
  status = 200

[[redirects]]
  from = "/api/approve-registration"
  to = "/.netlify/functions/approve-registration"
  status = 200

[[redirects]]
  from = "/api/get-ticket"
  to = "/.netlify/functions/get-ticket"
  status = 200

[[redirects]]
  from = "/api/check-in"
  to = "/.netlify/functions/check-in"
  status = 200

[[redirects]]
  from = "/api/projects"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/scores"
  to = "/.netlify/functions/scores"
  status = 200

[[redirects]]
  from = "/api/scanner-stats"
  to = "/.netlify/functions/scanner-stats"
  status = 200

[[redirects]]
  from = "/participant-ticket.html"
  to = "/"
  status = 404

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
