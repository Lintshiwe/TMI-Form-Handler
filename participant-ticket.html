<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMI Hackathon - Participant Ticket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --tmi-blue: #2563eb;
            --tmi-dark: #1e293b;
            --tmi-light: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tmi-light);
            color: var(--tmi-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .ticket-wrapper {
            position: relative;
            width: 400px;
            min-height: 600px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 30px;
        }
        .ticket-header {
            text-align: center;
            width: 100%;
        }
        .ticket-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .ticket-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .ticket-title {
            font-size: 26px; font-weight: 900;
            letter-spacing: -1px;
        }
        .ticket-title .tm { color: #000; }
        .ticket-title .i { color: var(--tmi-blue); }
        .ticket-subtitle {
            font-size: 11px; font-weight: 600; color: var(--tmi-blue);
            text-transform: uppercase; letter-spacing: 2px;
            margin-top: 2px;
        }

        .ticket-body {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            text-align: center;
            margin: 24px 0;
        }
        .attendee-name {
            font-size: 22px; font-weight: 800; color: var(--tmi-dark);
            margin-bottom: 4px; line-height: 1.2;
        }
        .participant-badge {
            display: inline-block; padding: 4px 14px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: var(--tmi-blue);
            border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .team-info {
            font-size: 13px; color: #64748b;
            margin-bottom: 20px; font-weight: 500;
        }
        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
        }
        #qrcode img { display: block !important; }
        .ticket-id {
            font-family: monospace; font-size: 12px;
            color: #94a3b8; letter-spacing: 1px;
        }
        .ticket-footer {
            text-align: center;
            width: 100%;
        }
        .scan-hint {
            font-size: 11px; color: #94a3b8;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .checked-in-msg {
            display: inline-block; padding: 6px 16px;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #059669;
            border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .error-box {
            padding: 16px; background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 12px; margin-top: 16px; font-size: 14px;
            text-align: center; font-weight: 500;
        }
        .loading-dots::after {
            content: ''; animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        @media print {
            body { background: white; padding: 0; }
            .ticket-wrapper { border: 1px solid #e2e8f0; page-break-inside: avoid; margin: 0 auto; }
        }
        @media (max-width: 480px) {
            .ticket-wrapper { width: 100%; max-width: 340px; padding: 30px 20px; }
            .ticket-logo { width: 52px; height: 52px; }
            .ticket-title { font-size: 22px; }
            .attendee-name { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="ticket-wrapper" id="ticket">
        <div class="ticket-header">
            <div class="ticket-logo">
                <img src="assets/tmi-logo.png" alt="TMI Logo">
            </div>
            <div class="ticket-title">
                <span class="tm">TM</span><span class="i">I</span> HACKATHON
            </div>
            <div class="ticket-subtitle">Official Entry Pass</div>
        </div>
        <div class="ticket-body">
            <div class="attendee-name" id="displayName">Loading<span class="loading-dots"></span></div>
            <div class="participant-badge" id="displayBadge">PARTICIPANT</div>
            <div class="checked-in-msg" id="checkedInMsg" style="display:none">Checked In</div>
            <div class="team-info" id="displayTeam"></div>
            <div id="qrcode"></div>
            <div class="ticket-id" id="displayId"></div>
            <div id="ticketStatus" class="error-box" style="display:none"></div>
        </div>
        <div class="ticket-footer">
            <div class="scan-hint">Scan at entrance for validation</div>
        </div>
    </div>

    <script>
        let qrCodeInstance = null;

        function generateQR(text) {
            var container = document.getElementById('qrcode');
            container.innerHTML = '';
            qrCodeInstance = new QRCode(container, {
                text: text,
                width: 160,
                height: 160,
                colorDark: '#2563eb',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        (function() {
            var params = new URLSearchParams(window.location.search);
            var ticketId = params.get('ticketId');
            var statusBox = document.getElementById('ticketStatus');

            if (ticketId) {
                fetch('/api/get-ticket?ticketId=' + encodeURIComponent(ticketId))
                    .then(function(r) { return r.json(); })
                    .then(function(json) {
                        if (!json.success || !json.data) throw new Error(json.error || 'Ticket not found');
                        var d = json.data;

                        document.getElementById('displayName').textContent = d.firstName + ' ' + d.lastName;
                        document.getElementById('displayTeam').textContent = 'Team: ' + (d.teamName || 'Unassigned') + ' • ' + (d.hackathonTrack || 'General');
                        document.getElementById('displayId').textContent = d.ticketId;

                        if (d.status === 'Checked In') {
                            document.getElementById('displayBadge').style.display = 'none';
                            document.getElementById('checkedInMsg').style.display = '';
                        } else {
                            document.getElementById('displayBadge').style.display = '';
                            document.getElementById('checkedInMsg').style.display = 'none';
                        }

                        var sig = d.sig || '';
                        var qrText = JSON.stringify({ ticketId: d.ticketId, name: d.firstName + ' ' + d.lastName, sig: sig, event: 'TMI Hackathon 2024' });
                        generateQR(qrText);
                    })
                    .catch(function(err) {
                        document.getElementById('displayName').textContent = 'Ticket Not Found';
                        document.getElementById('displayTeam').textContent = '';
                        document.getElementById('displayId').textContent = ticketId;
                        statusBox.textContent = 'Error: ' + err.message;
                        statusBox.style.display = '';
                    });
            } else {
                document.getElementById('displayName').textContent = 'No ticket ID provided';
                document.getElementById('displayTeam').textContent = 'Use the link from your email to view your ticket';
                document.getElementById('displayId').textContent = 'TMI-??????';
                generateQR('https://tmi-form-handler.netlify.app');
            }
        })();
    </script>
</body>
</html>
