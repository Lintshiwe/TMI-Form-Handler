<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMI Hackathon - Participant Ticket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --tmi-blue: #2563eb;
            --tmi-dark: #0f172a;
            --bg-color: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--tmi-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Controls Section */
        .controls {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            z-index: 10;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label { 
            display: block; font-size: 13px; font-weight: 600; 
            color: #64748b; margin-bottom: 6px; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }
        .input-group input {
            width: 100%; padding: 12px 16px; 
            border: 1px solid #e2e8f0; border-radius: 10px;
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--tmi-blue); }

        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 14px; border: none; 
            border-radius: 10px; font-size: 15px; 
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: var(--tmi-blue); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-secondary { background: #f1f5f9; color: var(--tmi-dark); }
        .btn-secondary:hover { background: #e2e8f0; }

        /* Ticket Content Overlay */
        .ticket-header { text-align: center; width: 100%; }
        .ticket-logo-text { 
            font-size: 28px; font-weight: 900; color: #10283f; 
            letter-spacing: -1px; margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }
        .ticket-subtitle { 
            font-size: 12px; font-weight: 600; color: #2563eb; 
            text-transform: uppercase; letter-spacing: 2px; 
        }

        .ticket-body { 
            background: rgba(255,255,255,0.92); 
            backdrop-filter: blur(10px);
            border-radius: 16px; 
            padding: 24px; 
            width: 100%; 
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .attendee-name { 
            font-size: 22px; font-weight: 800; color: #0f172a; 
            margin-bottom: 4px; line-height: 1.2;
        }
        .participant-badge { 
            display: inline-block; padding: 4px 12px; 
            background: #eff6ff; color: #2563eb; 
            border-radius: 20px; font-size: 11px; 
            font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 16px;
        }

        .team-info { 
            font-size: 13px; color: #64748b; 
            margin-bottom: 20px; font-weight: 500;
        }

        #qrcode { 
            display: inline-block; 
            padding: 12px; 
            background: white; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
        }
        #qrcode img { display: block !important; }

        .ticket-id { 
            font-family: monospace; font-size: 12px; 
            color: #94a3b8; letter-spacing: 1px; 
        }

        .ticket-footer { text-align: center; width: 100%; }
        .scan-hint { 
            font-size: 11px; color: #10283f; opacity: 0.7; 
            font-weight: 600; text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        /* Print Styles */
        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .ticket-wrapper { 
                box-shadow: none; 
                border: 1px solid #e2e8f0; 
                page-break-inside: avoid;
                margin: 0 auto;
            }
        }

        @media (max-width: 480px) {
            .ticket-wrapper { 
                width: 100%; max-width: 340px; 
                height: 520px; padding: 30px 20px; 
            }
            .ticket-logo-text { font-size: 24px; }
            .attendee-name { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Input Controls -->
    <div class="controls">
        <div class="input-group">
            <label>Participant Name</label>
            <input type="text" id="nameInput" value="Lintshiwe Pontsho Ntoampi" placeholder="Enter full name">
        </div>
        <div class="input-group">
            <label>Team Name</label>
            <input type="text" id="teamInput" value="NeuralNinjas" placeholder="Enter team name">
        </div>
        <div class="input-group">
            <label>Track / Category</label>
            <input type="text" id="trackInput" value="AI & ML" placeholder="e.g., AI & ML, Web Dev">
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="randomizeTicket()">Randomize</button>
            <button class="btn btn-primary" onclick="generateTicket()">Generate Ticket</button>
        </div>
        <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-secondary" onclick="window.print()" style="flex:1;">🖨️ Print Ticket</button>
        </div>
    </div>

    <!-- The Ticket -->
    <div class="ticket-wrapper" id="ticket">
        <div class="ticket-header">
            <div class="ticket-logo-text">TMI HACKATHON</div>
            <div class="ticket-subtitle">Official Entry Pass</div>
        </div>

        <div class="ticket-body">
            <div class="attendee-name" id="displayName">Lintshiwe Pontsho Ntoampi</div>
            <div class="participant-badge">PARTICIPANT</div>
            <div class="team-info" id="displayTeam">Team: NeuralNinjas • AI & ML</div>
            
            <div id="qrcode"></div>
            
            <div class="ticket-id" id="displayId">TMI-2024-XK9P2M</div>
        </div>

        <div class="ticket-footer">
            <div class="scan-hint">Scan at entrance for validation</div>
        </div>
    </div>

    <script>
        let qrCodeInstance = null;

        function generateUUID() {
            return 'TMI-' + Math.random().toString(36).substring(2, 8).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function generateTicket() {
            const name = document.getElementById('nameInput').value || 'Guest Participant';
            const team = document.getElementById('teamInput').value || 'Unassigned';
            const track = document.getElementById('trackInput').value || 'General';
            const ticketId = generateUUID();
            
            // Update Text
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayTeam').textContent = `Team: ${team} • ${track}`;
            document.getElementById('displayId').textContent = ticketId;

            // Generate QR Code
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            // Payload for scanner: JSON string with participant details
            const qrData = JSON.stringify({
                id: ticketId,
                name: name,
                role: "PARTICIPANT",
                team: team,
                track: track,
                event: "TMI Hackathon 2024",
                timestamp: new Date().toISOString()
            });

            qrCodeInstance = new QRCode(qrContainer, {
                text: qrData,
                width: 160,
                height: 160,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function randomizeTicket() {
            const names = ["Sarah Chen", "James Wilson", "Maria Garcia", "David Kim", "Emma Thompson"];
            const teams = ["NeuralNinjas", "CodeCrafters", "AppBuilders", "DataWizards", "DeepLearn"];
            const tracks = ["AI & ML", "Web Dev", "Mobile", "Data Science"];
            
            document.getElementById('nameInput').value = names[Math.floor(Math.random() * names.length)];
            document.getElementById('teamInput').value = teams[Math.floor(Math.random() * teams.length)];
            document.getElementById('trackInput').value = tracks[Math.floor(Math.random() * tracks.length)];
            generateTicket();
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', generateTicket);
    </script>
</body>
</html>
