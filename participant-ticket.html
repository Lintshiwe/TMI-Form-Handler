<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMI Hackathon - Participant Ticket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --tmi-blue: #2563eb;
            --tmi-dark: #0f172a;
            --tmi-navy: #0a1628;
            --tmi-accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tmi-navy);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .controls {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
            z-index: 10;
        }
        .controls label { color: #94a3b8; }
        .controls input {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
            color: white;
        }
        .controls input:focus { border-color: var(--tmi-accent); }
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: #94a3b8; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            font-size: 15px; outline: none; transition: border-color 0.2s;
            background: rgba(255,255,255,0.06);
            color: white;
        }
        .input-group input::placeholder { color: #475569; }
        .input-group input:focus { border-color: var(--tmi-accent); }
        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 14px; border: none;
            border-radius: 10px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--tmi-blue), var(--tmi-accent));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(37,99,235,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .ticket-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background: var(--tmi-navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 30px;
        }
        .ticket-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/tmi-logo.png') center / 80% no-repeat;
            filter: blur(40px) opacity(0.12);
            transform: scale(1.2);
            pointer-events: none;
        }
        .ticket-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .ticket-header {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }
        .ticket-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3);
        }
        .ticket-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .ticket-title {
            font-size: 26px; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        .ticket-subtitle {
            font-size: 11px; font-weight: 600; color: var(--tmi-accent);
            text-transform: uppercase; letter-spacing: 2px;
            margin-top: 2px;
        }

        .ticket-body {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            text-align: center;
        }
        .attendee-name {
            font-size: 22px; font-weight: 800; color: white;
            margin-bottom: 4px; line-height: 1.2;
        }
        .participant-badge {
            display: inline-block; padding: 4px 14px;
            background: linear-gradient(135deg, rgba(37,99,235,0.2), rgba(59,130,246,0.1));
            border: 1px solid rgba(59,130,246,0.3);
            color: var(--tmi-accent);
            border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .team-info {
            font-size: 13px; color: #94a3b8;
            margin-bottom: 20px; font-weight: 500;
        }
        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            margin-bottom: 16px;
        }
        #qrcode img { display: block !important; }
        .ticket-id {
            font-family: monospace; font-size: 12px;
            color: #64748b; letter-spacing: 1px;
        }
        .ticket-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
        }
        .scan-hint {
            font-size: 11px; color: #64748b;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .checked-in-msg {
            display: inline-block; padding: 6px 16px;
            background: rgba(22,163,74,0.15);
            border: 1px solid rgba(22,163,74,0.3);
            color: #4ade80;
            border-radius: 20px; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px;
        }
        .error-box {
            padding: 16px; background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.2);
            color: #fca5a5;
            border-radius: 12px; margin-top: 16px; font-size: 14px;
            text-align: center; font-weight: 500;
        }
        .loading-dots::after {
            content: ''; animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        @media print {
            body { background: var(--tmi-navy); padding: 0; }
            .controls { display: none; }
            .ticket-wrapper { box-shadow: none; border: 1px solid rgba(255,255,255,0.1); page-break-inside: avoid; margin: 0 auto; }
        }
        @media (max-width: 480px) {
            .ticket-wrapper { width: 100%; max-width: 340px; height: 520px; padding: 30px 20px; }
            .ticket-logo { width: 52px; height: 52px; }
            .ticket-title { font-size: 22px; }
            .attendee-name { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="input-group">
            <label>Participant Name</label>
            <input type="text" id="nameInput" value="Lintshiwe Pontsho Ntoampi" placeholder="Enter full name">
        </div>
        <div class="input-group">
            <label>Team Name</label>
            <input type="text" id="teamInput" value="NeuralNinjas" placeholder="Enter team name">
        </div>
        <div class="input-group">
            <label>Track / Category</label>
            <input type="text" id="trackInput" value="AI & ML" placeholder="e.g., AI & ML, Web Dev">
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="randomizeTicket()">Randomize</button>
            <button class="btn btn-primary" onclick="generateTicket()">Generate Ticket</button>
        </div>
        <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-secondary" onclick="window.print()" style="flex:1;">Print Ticket</button>
        </div>
        <div id="ticketStatus" class="error-box" style="display:none"></div>
    </div>

    <div class="ticket-wrapper" id="ticket">
        <div class="ticket-header">
            <div class="ticket-logo">
                <img src="assets/tmi-logo.png" alt="TMI Logo">
            </div>
            <div class="ticket-title">TMI HACKATHON</div>
            <div class="ticket-subtitle">Official Entry Pass</div>
        </div>
        <div class="ticket-body">
            <div class="attendee-name" id="displayName">Loading<span class="loading-dots"></span></div>
            <div class="participant-badge" id="displayBadge">PARTICIPANT</div>
            <div class="checked-in-msg" id="checkedInMsg" style="display:none">Checked In</div>
            <div class="team-info" id="displayTeam"></div>
            <div id="qrcode"></div>
            <div class="ticket-id" id="displayId"></div>
        </div>
        <div class="ticket-footer">
            <div class="scan-hint">Scan at entrance for validation</div>
        </div>
    </div>

    <script>
        let qrCodeInstance = null;

        function generateId() {
            return 'TMI-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function generateQR(text) {
            var container = document.getElementById('qrcode');
            container.innerHTML = '';
            qrCodeInstance = new QRCode(container, {
                text: text,
                width: 160,
                height: 160,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function generateTicket() {
            var name = document.getElementById('nameInput').value || 'Guest Participant';
            var team = document.getElementById('teamInput').value || 'Unassigned';
            var track = document.getElementById('trackInput').value || 'General';
            var ticketId = generateId();

            document.getElementById('displayName').textContent = name;
            document.getElementById('displayTeam').textContent = 'Team: ' + team + ' • ' + track;
            document.getElementById('displayId').textContent = ticketId;
            document.getElementById('displayBadge').style.display = '';
            document.getElementById('checkedInMsg').style.display = 'none';

            generateQR(JSON.stringify({ id: ticketId, name: name, team: team, track: track, event: 'TMI Hackathon 2024' }));
        }

        function randomizeTicket() {
            var names = ['Sarah Chen', 'James Wilson', 'Maria Garcia', 'David Kim', 'Emma Thompson'];
            var teams = ['NeuralNinjas', 'CodeCrafters', 'AppBuilders', 'DataWizards', 'DeepLearn'];
            var tracks = ['AI & ML', 'Web Dev', 'Mobile', 'Data Science'];

            document.getElementById('nameInput').value = names[Math.floor(Math.random() * names.length)];
            document.getElementById('teamInput').value = teams[Math.floor(Math.random() * teams.length)];
            document.getElementById('trackInput').value = tracks[Math.floor(Math.random() * tracks.length)];
            generateTicket();
        }

        // Auto-load from API if ticketId is in URL
        (function() {
            var params = new URLSearchParams(window.location.search);
            var ticketId = params.get('ticketId');
            var statusBox = document.getElementById('ticketStatus');

            if (ticketId) {
                document.querySelector('.controls').style.display = 'none';

                fetch('/api/get-ticket?ticketId=' + encodeURIComponent(ticketId))
                    .then(function(r) { return r.json(); })
                    .then(function(json) {
                        if (!json.success || !json.data) throw new Error(json.error || 'Ticket not found');
                        var d = json.data;

                        document.getElementById('displayName').textContent = d.firstName + ' ' + d.lastName;
                        document.getElementById('displayTeam').textContent = 'Team: ' + (d.teamName || 'Unassigned') + ' • ' + (d.hackathonTrack || 'General');
                        document.getElementById('displayId').textContent = d.ticketId;

                        if (d.status === 'Checked In') {
                            document.getElementById('displayBadge').style.display = 'none';
                            document.getElementById('checkedInMsg').style.display = '';
                        } else {
                            document.getElementById('displayBadge').style.display = '';
                            document.getElementById('checkedInMsg').style.display = 'none';
                        }

                        var sig = d.sig || '';
                        var qrText = JSON.stringify({ ticketId: d.ticketId, name: d.firstName + ' ' + d.lastName, sig: sig, event: 'TMI Hackathon 2024' });
                        generateQR(qrText);
                    })
                    .catch(function(err) {
                        document.getElementById('displayName').textContent = 'Ticket Not Found';
                        document.getElementById('displayTeam').textContent = '';
                        document.getElementById('displayId').textContent = ticketId;
                        statusBox.textContent = 'Error: ' + err.message + '. Use the form below to generate a test ticket.';
                        statusBox.style.display = '';
                        document.querySelector('.controls').style.display = '';
                    });
            } else {
                document.getElementById('displayName').textContent = 'Enter your details';
                document.getElementById('displayTeam').textContent = 'Fill in the form and generate your ticket';
                document.getElementById('displayId').textContent = 'TMI-??????';
                generateQR('https://tmi-form-handler.netlify.app/participant-ticket.html');
            }
        })();
    </script>
</body>
</html>
