<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Dashboard</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        body { padding: 0; }
        .dashboard-container {
            min-height: 100vh;
            max-width: 100%;
            border-radius: 0;
            display: flex;
            flex-direction: column;
        }
        .main-content { flex: 1; }
        .table-container { flex: 1; }
        table { height: 100%; }
        .reg-status-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 9999px;
            font-size: 13px; font-weight: 600;
            transition: all 0.2s ease;
        }
        .reg-status-badge.open { background: #ecfdf5; color: #16a34a; }
        .reg-status-badge.closed { background: #fef2f2; color: #dc2626; }
        .reg-status-icon {
            width: 18px; height: 18px;
            flex-shrink: 0; display: inline-flex;
        }
        .reg-status-icon svg { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="dashboard-container">

    <div class="header">
        <div style="display:flex;align-items:center;gap:12px">
            <img src="assets/logo-slogan.png" alt="TMI Logo" style="height:36px">
            <h1>Registration Dashboard</h1>
        </div>
        <div class="header-right">
            <div class="reg-status-badge" id="regStatusBadge">
                <span class="reg-status-icon" id="regStatusIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </span>
                <span id="regStatusText">Loading...</span>
            </div>
            <button class="export-btn" onclick="exportData()">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Export CSV / PDF
            </button>
            <div class="avatar" id="headerAvatar">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
        </div>
    </div>

    <div class="summary-cards">
        <div class="card active skeleton" id="sk-card-1">
            <div class="sk sk-card"></div>
        </div>
        <div class="card skeleton" id="sk-card-2">
            <div class="sk sk-card"></div>
        </div>
        <div class="card skeleton" id="sk-card-3">
            <div class="sk sk-card"></div>
        </div>
        <div class="card skeleton" id="sk-card-4">
            <div class="sk sk-card"></div>
        </div>

        <div class="card active" id="card-total" style="display:none">
            <div class="card-label">Total Registrations</div>
            <div class="card-value" id="totalReg">0</div>
        </div>
        <div class="card" id="card-teams" style="display:none">
            <div class="card-label">Teams Registered</div>
            <div class="card-value" id="teamsReg">0</div>
        </div>
        <div class="card" id="card-provinces" style="display:none">
            <div class="card-label">Provinces Reached</div>
            <div class="card-value" id="provincesReached">0</div>
        </div>
        <div class="card" id="card-pending" style="display:none">
            <div class="card-label">Pending Approvals</div>
            <div class="card-value">&nbsp;</div>
            <div class="pending-badge" id="pendingBadge">0</div>
        </div>
    </div>

    <div class="main-content">
        <nav class="sidebar">
            <a href="index.html" class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Dashboard
            </a>
            <a href="pages/registrations.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                All Registrations
            </a>
            <a href="pages/analytics.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                Analytics
            </a>
            <a href="pages/settings.html" class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                Settings
            </a>
        </nav>

        <div class="content-area">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search participants..." oninput="filterTable()">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>

            <div class="table-container">
                <div id="sk-table" class="skeleton">
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                    <div class="sk-row"><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell"></span><span class="sk sk-cell-sm"></span><span class="sk sk-cell-sm"></span></div>
                </div>
                <table id="data-table" style="display:none">
                    <thead>
                        <tr>
                            <th>Name</th><th>Email</th><th>Track/Category</th>
                            <th>Province</th><th>Team Name</th>
                            <th>Registration Date</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="assets/app.js?v=3"></script>
<script>
    function showCards() {
        ['sk-card-1','sk-card-2','sk-card-3','sk-card-4'].forEach(function(id) { var el=document.getElementById(id); if(el){el.style.display='none'} });
        ['card-total','card-teams','card-provinces','card-pending'].forEach(function(id) { var el=document.getElementById(id); if(el){el.style.display=''} });
    }

    function renderDashboard() {
        showCards();
        TMI.hideSkeletons();
        var dt=document.getElementById('data-table'); if(dt) dt.style.display='';
        var rows = TMI.registrations;

        var total = rows.length;
        var teams = {};
        var provinces = {};
        var pending = 0;
        var latest = rows.slice(0, 10);

        rows.forEach(function(r) {
            if (r.teamName) teams[r.teamName] = true;
            var prov = TMI.getProvince(r);
            if (prov && prov !== '-') provinces[prov] = (provinces[prov] || 0) + 1;
            if (!r.status || r.status === 'Pending') pending++;
        });

        animateValue('totalReg', 0, total, 1000);
        animateValue('teamsReg', 0, Object.keys(teams).length, 800);
        animateValue('provincesReached', 0, Object.keys(provinces).length, 600);

        var pb = document.getElementById('pendingBadge');
        if (pb) {
            var t0 = performance.now();
            (function step(now) {
                var p = Math.min((now - t0) / 900, 1);
                pb.textContent = Math.floor(pending * p);
                if (p < 1) requestAnimationFrame(step);
            })(t0);
        }

        var tbody = document.getElementById('tableBody');
        if (tbody) {
            tbody.innerHTML = latest.map(function(r) {
                return '<tr>' +
                    '<td>' + TMI.getFullName(r) + '</td>' +
                    '<td>' + (r.email || '-') + '</td>' +
                    '<td>' + (r.hackathonTrack || '-') + '</td>' +
                    '<td>' + TMI.getProvince(r) + '</td>' +
                    '<td>' + (r.teamName || '-') + '</td>' +
                    '<td>' + TMI.formatDate(r.createdAt) + '</td>' +
                    '<td>' + TMI.getStatusBadge(r) + '</td>' +
                    '</tr>';
            }).join('');
        }

        TMI.renderProfileAvatar(document.getElementById('headerAvatar'));
    }

    window.addEventListener('DOMContentLoaded', function() {
        TMI.updateRegBadge();
        if (TMI.registrations.length) {
            renderDashboard();
        } else {
            TMI.fetchRegistrations().then(renderDashboard);
        }
    });
</script>
</body>
</html>
